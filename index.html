<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f-shopp | Plantillas Automáticas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 60px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auto-badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: #1a1a2e;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(233,69,96,0.2);
            border-color: #e94560;
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: #0f0f1a;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #fff;
        }

        .product-desc {
            color: #a0a0a0;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 15px;
        }

        .product-price small {
            font-size: 0.8rem;
            color: #666;
        }

        .btn-buy {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-buy:hover {
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #e94560;
        }

        .payment-option {
            border: 2px solid #2a2a3e;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .payment-option:hover,
        .payment-option.selected {
            border-color: #e94560;
            background: #252540;
        }

        .crypto-address {
            background: #0f0f1a;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            margin: 10px 0;
            color: #e94560;
        }

        .btn-copy {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #a0a0a0;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 2px solid #2a2a3e;
            border-radius: 8px;
            color: #fff;
            font-size: 0.9rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn-confirm {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: 40px;
        }

        .stats {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .logo {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="logo">
            ⚡ f-shopp 
            <span class="auto-badge">AUTO</span>
        </h1>
        <p class="tagline">Escaneo automático - Solo sube tu plantilla a GitHub</p>
    </div>

    <div class="container">
        <div id="products" class="products-grid">
            <div class="loading">🔍 Escaneando carpetas en GitHub...</div>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="footer">
        <p>📦 ¿Cómo funciona? Sube tu .zip e imagen a /templates/ y aparece automáticamente</p>
        <p style="font-size: 0.8rem; margin-top: 10px;">🔐 Las contraseñas se entregan manualmente tras verificar el pago</p>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            GITHUB_USER: 'zyssglobal-max',
            GITHUB_REPO: 'f-shopp',
            BRANCH: 'main',
            TEMPLATES_PATH: 'templates',
            DEFAULT_PRICE: 29.99,
            ADMIN_EMAIL: 'tu@email.com',
            // WEBHOOK_URL: 'https://formspree.io/f/tu_id',
            
            // DIRECCIONES CRYPTO
            CRYPTO: {
                BTC: 'bc1q...tu_direccion_btc',      
                LTC: 'ltc1q...tu_direccion_ltc',     
                USDT_TRC20: 'T...tu_direccion_usdt'  
            }
        };

        let products = [];
        let selectedProduct = null;
        let selectedPayment = null;
        
        async function scanTemplates() {
            try {
                const apiUrl = `https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.TEMPLATES_PATH}?ref=${CONFIG.BRANCH}`;
                
                const response = await fetch(apiUrl, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) {
                    throw new Error(`GitHub API error: ${response.status}`);
                }
                
                const contents = await response.json();
                if (!contents || contents.message === 'Not Found') {
                    document.getElementById('products').innerHTML = `
                        <div class="loading">
                            📁 Crea la carpeta /templates/ en tu repositorio<br>
                            <small>https://github.com/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}</small>
                        </div>
                    `;
                    return;
                }
                
                const folders = contents.filter(item => item.type === 'dir');
                
                if (folders.length === 0) {
                    document.getElementById('products').innerHTML = `
                        <div class="loading">
                            📁 No hay plantillas aún<br>
                            <small>Crea subcarpetas dentro de /templates/ con tu .zip e imagen</small>
                        </div>
                    `;
                    return;
                }
                
                const scanPromises = folders.map(async (folder, index) => {
                    const folderName = folder.name;
                    const folderPath = `${CONFIG.TEMPLATES_PATH}/${folderName}`;
                    
                    const folderUrl = `https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${folderPath}?ref=${CONFIG.BRANCH}`;
                    const folderResponse = await fetch(folderUrl);
                    const files = await folderResponse.json();
                    
                    const zipFile = files.find(f => f.name.endsWith('.zip'));
                    const imageFile = files.find(f => f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
                    
                    if (!zipFile) return null;
                    
                    let metadata = { name: folderName, price: CONFIG.DEFAULT_PRICE, description: '' };
                    const metadataFile = files.find(f => f.name === 'info.json');
                    if (metadataFile) {
                        try {
                            const metaResponse = await fetch(metadataFile.download_url);
                            metadata = await metaResponse.json();
                        } catch(e) {}
                    }
                    
                    return {
                        id: index,
                        name: metadata.name || folderName.replace(/-/g, ' ').replace(/_/g, ' '),
                        description: metadata.description || `Plantilla ${folderName} - Diseño profesional y responsive`,
                        price: metadata.price || CONFIG.DEFAULT_PRICE,
                        image: imageFile ? imageFile.download_url : `https://placehold.co/600x400/1a1a2e/e94560?text=${encodeURIComponent(folderName)}`,
                        zipUrl: zipFile.download_url,
                        zipName: zipFile.name,
                        folder: folderName
                    };
                });
                
                const results = await Promise.all(scanPromises);
                products = results.filter(p => p !== null);
                
                renderProducts();
                
                document.getElementById('stats').innerHTML = `
                    📊 ${products.length} plantillas disponibles | 
                    🔄 Escaneo automático | 
                    📁 /${CONFIG.TEMPLATES_PATH}/
                `;
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('products').innerHTML = `
                    <div class="loading">
                        ❌ Error al escanear<br>
                        <small>${error.message}<br>
                        Verifica que el repositorio sea público: https://github.com/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}</small>
                    </div>
                `;
            }
        }

        function renderProducts() {
            const container = document.getElementById('products');
            if (!container) return;
            
            if (products.length === 0) {
                container.innerHTML = '<div class="loading">📁 No hay plantillas. Sube carpetas a /templates/</div>';
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-card">
                    <img class="product-image" src="${product.image}" alt="${product.name}" onerror="this.src='https://placehold.co/600x400/1a1a2e/e94560?text=${encodeURIComponent(product.name)}'">
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.name)}</div>
                        <div class="product-desc">${escapeHtml(product.description.substring(0, 120))}${product.description.length > 120 ? '...' : ''}</div>
                        <div class="product-price">$${product.price} <small>USD</small></div>
                        <button class="btn-buy" onclick="openPaymentModal(${product.id})">💰 Comprar ahora</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openPaymentModal(productId) {
            selectedProduct = products.find(p => p.id === productId);
            if (!selectedProduct) return;
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">🎁 Comprar: ${escapeHtml(selectedProduct.name)}</div>
                <div style="margin-bottom: 20px; color: #a0a0a0;">
                    Precio: <strong style="color:#e94560">$${selectedProduct.price} USD</strong>
                </div>
                <h4>Selecciona método de pago:</h4>
                <div class="payment-option" onclick="selectPayment('BTC')">₿ Bitcoin (BTC)</div>
                <div class="payment-option" onclick="selectPayment('LTC')">Ł Litecoin (LTC)</div>
                <div class="payment-option" onclick="selectPayment('USDT_TRC20')">💎 USDT (TRC20)</div>
                <div id="cryptoInfo" style="margin-top: 20px; display: none;"></div>
                <div class="form-group">
                    <label>📧 Tu correo electrónico:</label>
                    <input type="email" id="buyerEmail" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="form-group">
                    <label>📝 Nota (opcional):</label>
                    <input type="text" id="buyerNote" placeholder="Referencia o mensaje">
                </div>
                <button class="btn-confirm" onclick="confirmPurchase()">✅ Confirmar compra</button>
            `;
            
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            const cryptoInfo = document.getElementById('cryptoInfo');
            const address = CONFIG.CRYPTO[method];
            
            cryptoInfo.style.display = 'block';
            cryptoInfo.innerHTML = `
                <p>Envía el pago a esta dirección:</p>
                <div class="crypto-address">${address}</div>
                <button class="btn-copy" onclick="copyAddress('${address}')">📋 Copiar dirección</button>
                <p style="font-size: 0.7rem; color: #666; margin-top: 10px;">
                    ⚠️ Monto exacto: <strong>$${selectedProduct.price} USD</strong><br>
                    Luego haz clic en "Confirmar compra"
                </p>
            `;
        }

        function copyAddress(address) {
            navigator.clipboard.writeText(address);
            alert('✅ Dirección copiada');
        }

        async function confirmPurchase() {
            const email = document.getElementById('buyerEmail')?.value;
            if (!email) { alert('❌ Ingresa tu correo'); return; }
            if (!selectedPayment) { alert('❌ Selecciona método de pago'); return; }
            
            const note = document.getElementById('buyerNote')?.value || '';
            const btn = document.querySelector('.btn-confirm');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Enviando...';
            btn.disabled = true;
            
            const purchaseData = {
                product: selectedProduct.name,
                price: selectedProduct.price,
                paymentMethod: selectedPayment,
                buyerEmail: email,
                buyerNote: note,
                zipFile: selectedProduct.zipName,
                timestamp: new Date().toISOString(),
                message: `🛒 NUEVA COMPRA EN f-shopp!\n\nProducto: ${selectedProduct.name}\nPrecio: $${selectedProduct.price} USD\nMétodo: ${selectedPayment}\nComprador: ${email}\nNota: ${note}\nZIP: ${selectedProduct.zipName}\nURL: ${selectedProduct.zipUrl}`
            };
            
            try {
                await fetch(CONFIG.WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(purchaseData)
                });
                alert(`✅ Compra registrada!\n\nTe contactaremos a ${email} con la contraseña tras verificar el pago.`);
                closeModal();
            } catch (error) {
                alert(`⚠️ Contacta a: ${CONFIG.ADMIN_EMAIL}\nReferencia: ${selectedProduct.name}`);
                closeModal();
            }
            
            btn.textContent = originalText;
            btn.disabled = false;
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
            selectedProduct = null;
            selectedPayment = null;
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
        
        scanTemplates();
        setInterval(scanTemplates, 300000);
    </script>
</body>
</html>
